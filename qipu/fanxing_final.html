<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{game_name}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 15px;
            max-width: 100%;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 18px;
            color: #333;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .header .info {
            color: #666;
            font-size: 12px;
            line-height: 1.6;
        }
        .board-container {
            display: flex;
            justify-content: center;
            margin: 10px 0;
            position: relative;
        }
        #board {
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            max-width: 100%;
            height: auto;
            display: block;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            background: #f0f0f0;
            color: #333;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 56px;
            height: 56px;
            font-size: 24px;
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .settings {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .setting-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: #555;
        }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #555;
        }
        .speed-control input {
            width: 100px;
        }
        .status {
            text-align: center;
            margin: 10px 0;
        }
        .move-info {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }
        .move-detail {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        .captured-info {
            font-size: 14px;
            color: #888;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #555;
        }
        .stone-black, .stone-white {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        .stone-black {
            background: radial-gradient(circle at 30% 30%, #666, #000);
        }
        .stone-white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            border: 1px solid #ddd;
        }
        @media (min-width: 600px) {
            .container {
                max-width: 500px;
                padding: 20px;
            }
            .header h1 {
                font-size: 20px;
            }
        }
        @media (min-width: 900px) {
            .container {
                max-width: 700px;
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="gameTitle">第8届扇兴杯世界女子最强战决赛<绝艺讲解></h1>
            <div class="info" id="gameInfo">
                加载中...
            </div>
        </div>

        <div class="board-container">
            <canvas id="board"></canvas>
        </div>

        <div class="controls">
            <button class="btn" onclick="goToStart()" title="跳到开头">⏮</button>
            <button class="btn" onclick="prevMove()" title="上一手">◀</button>
            <button class="btn btn-primary" id="playBtn" onclick="togglePlay()" title="播放/暂停">▶</button>
            <button class="btn" onclick="nextMove()" title="下一手">▶</button>
            <button class="btn" onclick="goToEnd()" title="跳到结尾">⏭</button>
        </div>

        <div class="settings">
            <div class="setting-item">
                <input type="checkbox" id="showNumbers" onchange="updateDisplay()">
                <label for="showNumbers">手数</label>
            </div>
            <div class="speed-control">
                <label>速度</label>
                <input type="range" id="speedRange" min="200" max="2000" value="800" step="200">
                <span id="speedValue">0.8s</span>
            </div>
            <button class="btn btn-success" onclick="downloadSGF()" title="下载SGF" style="width: 40px; height: 40px; font-size: 18px;">💾</button>
        </div>

        <div class="status">
            <div class="move-info" id="moveInfo">第 0 手</div>
            <div class="move-detail" id="moveDetail">点击播放开始打谱</div>
            <div class="captured-info" id="capturedInfo"></div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="stone-black"></div>
                <span id="blackName">藤沢里菜 P7段</span>
            </div>
            <div class="legend-item">
                <div class="stone-white"></div>
                <span id="whiteName">김은지 P9段</span>
            </div>
        </div>
    </div>

    <script>
        // SGF 数据
        const sgfData = `(;GM[1]FF[4]
SZ[19]
GN[第8届扇兴杯世界女子最强战决赛<绝艺讲解>]
DT[2026-03-15]
PB[藤沢里菜]
PW[김은지]
BR[P7段]
WR[P9段]
KM[650]HA[0]RU[Chinese]RE[W+R];B[qd];W[dd];B[dq];W[pp];B[dn];W[oc];B[pe];W[cf];B[kd];W[ic];B[nd];W[nq];B[nc];W[qk];B[fc];W[je];B[dc];W[cc];B[cb];W[bc];B[ed];W[db];B[ec];W[bb];B[eg];W[ke];B[kc];W[he];B[de];W[ip];B[hg];W[kh];B[cd];W[bd];B[gq];W[ph];B[mp];W[np];B[mn];W[mo];B[lo];W[no];B[km];W[kq];B[ck];W[ho];B[pm];W[qm];B[qn];W[pn];B[po];W[on];B[qp];W[rn];B[qo];W[rm];B[pq];W[rq];B[mr];W[nr];B[qq];W[rr];B[lq];W[kr];B[lr];W[kp];B[lp];W[om];B[im];W[fp];B[fq];W[ep];B[dp];W[en];B[iq];W[gm];B[em];W[do];B[co];W[eo];B[dm];W[eq];B[er];W[dr];B[fr];W[fm];B[jo];W[jp];B[ek];W[fk];B[hk];W[ej];B[el];W[gk];B[hj];W[cj];B[bj];W[dk];B[ci];W[di];B[dj];W[cn];B[bo];W[cj];B[cl];W[jj];B[ml];W[jl];B[il];W[fh];B[gi];W[fi];B[gf];W[ih];B[if];W[ie];B[dj];W[nb];B[mb];W[cj];B[dh];W[gg];B[hh];W[hf];B[dj];W[cr];B[bq];W[cj];B[hn];W[gp];B[hq];W[bi];B[dj];W[cq];B[cp];W[cj];B[ch];W[bk];B[dj];W[bn];B[bm];W[cj];B[gn];W[fn];B[dj];W[ao];B[bp];W[cj];B[or];W[aj];B[ns];W[fe];B[eb];W[ca];B[fg];W[gh];B[df];W[ge];B[ib];W[hb];B[hc];W[jb];B[id];W[gc];B[jc];W[gb];B[gd];W[hd];B[fd];W[ic];B[ce];W[ia];B[ee];W[io];B[ro];W[pb];B[qb];W[lb];B[na];W[oa];B[ob];W[qr];B[pa];W[jm];B[jn];W[kl];B[in];W[pr];B[oq];W[ol];B[lm];W[ko];B[kn];W[ff];B[bf];W[op];B[mj];W[mh];B[kj];W[ki];B[nk];W[lk];B[pj];W[qj];B[pi];W[ni];B[nj];W[qh];B[pk];W[pl];B[oh];W[oi];B[jr];W[ks];B[qi];W[ri];B[lj];W[jk];B[gj];W[fj];B[ps];W[qs];B[sp];W[os];B[ii];W[ji];B[ps];W[bg];B[cg];W[os];B[rh];W[rg];B[ps];W[am];B[cm];W[os];B[sh];W[sg];B[ps];W[an];B[al];W[os];B[pg];W[qg];B[ps];W[bl])`;

        const BOARD_SIZE = 19;
        
        // 解析 SGF - 支持平面格式（已清理的野狐SGF）
        function parseSGF(sgf) {
            const moves = [];
            const info = {};
            
            // 提取基本信息
            const pbMatch = sgf.match(/PB\[([^\]]+)\]/);
            const pwMatch = sgf.match(/PW\[([^\]]+)\]/);
            const brMatch = sgf.match(/BR\[([^\]]+)\]/);
            const wrMatch = sgf.match(/WR\[([^\]]+)\]/);
            const gnMatch = sgf.match(/GN\[([^\]]+)\]/);
            const dtMatch = sgf.match(/DT\[([^\]]+)\]/);
            const reMatch = sgf.match(/RE\[([^\]]+)\]/);
            
            if (pbMatch) info.black = pbMatch[1];
            if (pwMatch) info.white = pwMatch[1];
            if (brMatch) info.blackRank = brMatch[1];
            if (wrMatch) info.whiteRank = wrMatch[1];
            if (gnMatch) info.gameName = gnMatch[1];
            if (dtMatch) info.date = dtMatch[1];
            if (reMatch) info.result = reMatch[1];
            
            // 提取着法 - 平面格式直接按顺序提取
            const regex = /;([BW])\[([a-z]{2})\]/g;
            let match;
            while ((match = regex.exec(sgf)) !== null) {
                const color = match[1] === 'B' ? 'black' : 'white';
                const x = match[2].charCodeAt(0) - 97;
                const y = match[2].charCodeAt(1) - 97;
                moves.push({ color, x, y });
            }
            
            return { moves, info };
        }

        const { moves, info } = parseSGF(sgfData);
        let currentMove = 0;
        let isPlaying = false;
        let playInterval = null;

        // Canvas 设置
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = document.querySelector('.board-container');
            const maxWidth = Math.min(container.clientWidth - 20, window.innerWidth - 40, 570);
            const size = Math.max(300, maxWidth);
            
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            
            updateDisplay();
        }

        function getGridParams() {
            const margin = canvas.width * 0.05;
            const gridSize = (canvas.width - 2 * margin) / (BOARD_SIZE - 1);
            return { margin, gridSize };
        }

        // 创建棋盘状态数组
        function createBoard() {
            return Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(null));
        }

        // 气数计算和提子
        function getNeighbors(x, y) {
            const neighbors = [];
            const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
            for (const [dx, dy] of dirs) {
                const nx = x + dx, ny = y + dy;
                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    neighbors.push([nx, ny]);
                }
            }
            return neighbors;
        }

        function getGroup(board, x, y, color, group = null) {
            if (!group) group = new Set();
            const key = `${x},${y}`;
            if (group.has(key)) return group;
            if (board[y][x] !== color) return group;
            
            group.add(key);
            for (const [nx, ny] of getNeighbors(x, y)) {
                getGroup(board, nx, ny, color, group);
            }
            return group;
        }

        function getLiberties(board, x, y) {
            const color = board[y][x];
            const group = getGroup(board, x, y, color);
            const liberties = new Set();
            
            for (const key of group) {
                const [gx, gy] = key.split(',').map(Number);
                for (const [nx, ny] of getNeighbors(gx, gy)) {
                    if (board[ny][nx] === null) {
                        liberties.add(`${nx},${ny}`);
                    }
                }
            }
            
            return liberties;
        }

        // 绘制棋盘
        function drawBoard() {
            const { margin, gridSize } = getGridParams();
            const size = canvas.width;
            
            // 背景
            ctx.fillStyle = '#E3C16F';
            ctx.fillRect(0, 0, size, size);
            
            // 网格线
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                // 横线
                ctx.beginPath();
                ctx.moveTo(margin, margin + i * gridSize);
                ctx.lineTo(size - margin, margin + i * gridSize);
                ctx.stroke();
                
                // 竖线
                ctx.beginPath();
                ctx.moveTo(margin + i * gridSize, margin);
                ctx.lineTo(margin + i * gridSize, size - margin);
                ctx.stroke();
            }
            
            // 星位
            const stars = BOARD_SIZE === 19 ? [3, 9, 15] : [2, 6, 10];
            ctx.fillStyle = '#333';
            for (const x of stars) {
                for (const y of stars) {
                    ctx.beginPath();
                    ctx.arc(margin + x * gridSize, margin + y * gridSize, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // 绘制棋子
        function drawStone(x, y, color, isLast = false, moveNum = null) {
            const { margin, gridSize } = getGridParams();
            const cx = margin + x * gridSize;
            const cy = margin + y * gridSize;
            const radius = gridSize * 0.42;
            
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            
            // 渐变效果
            const gradient = ctx.createRadialGradient(
                cx - radius * 0.3, cy - radius * 0.3, radius * 0.1,
                cx, cy, radius
            );
            
            if (color === 'black') {
                gradient.addColorStop(0, '#666');
                gradient.addColorStop(1, '#000');
            } else {
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ccc');
            }
            
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 最后一手标记
            if (isLast) {
                ctx.beginPath();
                ctx.arc(cx, cy, radius * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = color === 'black' ? '#fff' : '#000';
                ctx.fill();
            }
            
            // 手数显示
            if (moveNum && document.getElementById('showNumbers').checked) {
                ctx.fillStyle = color === 'black' ? '#fff' : '#000';
                ctx.font = `bold ${Math.floor(gridSize * 0.5)}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(moveNum.toString(), cx, cy);
            }
        }

        // 更新显示
        function updateDisplay() {
            drawBoard();
            
            const board = createBoard();
            let blackCaptured = 0;
            let whiteCaptured = 0;
            
            for (let i = 0; i < currentMove; i++) {
                const move = moves[i];
                const opponent = move.color === 'black' ? 'white' : 'black';
                
                // 检查是否可以下子（简化处理，不处理所有规则）
                board[move.y][move.x] = move.color;
                
                // 检查提子
                for (const [nx, ny] of getNeighbors(move.x, move.y)) {
                    if (board[ny][nx] === opponent) {
                        const liberties = getLiberties(board, nx, ny);
                        if (liberties.size === 0) {
                            const group = getGroup(board, nx, ny, opponent);
                            for (const key of group) {
                                const [gx, gy] = key.split(',').map(Number);
                                board[gy][gx] = null;
                                if (opponent === 'white') blackCaptured++;
                                else whiteCaptured++;
                            }
                        }
                    }
                }
            }
            
            // 绘制所有棋子
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (board[y][x]) {
                        const isLast = (currentMove > 0 && 
                            moves[currentMove - 1].x === x && 
                            moves[currentMove - 1].y === y);
                        
                        // 找到这是第几手
                        let moveNum = null;
                        for (let i = 0; i < currentMove; i++) {
                            if (moves[i].x === x && moves[i].y === y) {
                                moveNum = i + 1;
                                break;
                            }
                        }
                        
                        drawStone(x, y, board[y][x], isLast, moveNum);
                    }
                }
            }
            
            // 更新状态信息
            document.getElementById('moveInfo').textContent = `第 ${currentMove} 手 / 共 ${moves.length} 手`;
            
            if (currentMove > 0) {
                const lastMove = moves[currentMove - 1];
                const coord = String.fromCharCode(97 + lastMove.x) + String.fromCharCode(97 + lastMove.y);
                const colorText = lastMove.color === 'black' ? '黑' : '白';
                document.getElementById('moveDetail').textContent = `${colorText}棋下在 ${coord.toUpperCase()}`;
            } else {
                document.getElementById('moveDetail').textContent = '点击播放开始打谱';
            }
            
            if (blackCaptured > 0 || whiteCaptured > 0) {
                document.getElementById('capturedInfo').textContent = 
                    `提子: 黑 ${blackCaptured} 子, 白 ${whiteCaptured} 子`;
            } else {
                document.getElementById('capturedInfo').textContent = '';
            }
        }

        // 控制函数
        function goToStart() {
            currentMove = 0;
            updateDisplay();
        }

        function goToEnd() {
            currentMove = moves.length;
            updateDisplay();
        }

        function prevMove() {
            if (currentMove > 0) {
                currentMove--;
                updateDisplay();
            }
        }

        function nextMove() {
            if (currentMove < moves.length) {
                currentMove++;
                updateDisplay();
            }
        }

        function togglePlay() {
            const btn = document.getElementById('playBtn');
            if (isPlaying) {
                clearInterval(playInterval);
                isPlaying = false;
                btn.textContent = '▶';
            } else {
                if (currentMove >= moves.length) {
                    currentMove = 0;
                }
                const speed = parseInt(document.getElementById('speedRange').value);
                isPlaying = true;
                btn.textContent = '⏸';
                playInterval = setInterval(() => {
                    if (currentMove < moves.length) {
                        currentMove++;
                        updateDisplay();
                    } else {
                        togglePlay();
                    }
                }, speed);
            }
        }

        function downloadSGF() {
            const blob = new Blob([sgfData], { type: 'application/x-go-sgf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'game.sgf';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevMove();
            else if (e.key === 'ArrowRight') nextMove();
            else if (e.key === ' ') togglePlay();
        });

        // 触摸滑动支持
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextMove();
                else prevMove();
            }
        });

        // 速度显示
        document.getElementById('speedRange').addEventListener('input', (e) => {
            document.getElementById('speedValue').textContent = (e.target.value / 1000) + 's';
        });

        // 初始化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
